<section class="tutoriales-page py-100 position-relative">
  <div class="container">
    <div class="text-center mb-5 mt-5">
      <h1 class="display-3 mb-3">Nuestros <span class="text-gradient">Tutoriales</span></h1>
      <p class="text-muted lead mx-auto" style="max-width: 600px;">
        Aprende técnicas avanzadas y trucos de Blender 3D con nuestros tutoriales gratuitos y de alta calidad.
      </p>
    </div>

    <div class="row g-4 mt-2">
      <div class="col-lg-4 col-md-6" *ngFor="let tut of tutorials">
        <div class="glass-card tutorial-card h-100">
          <div class="play-icon-wrapper mb-3">
            <ng-icon name="bootstrapPlayCircle"></ng-icon>
          </div>
          <h3 class="h4 fw-bold mb-3">{{tut.title}}</h3>
          <p class="text-muted mb-4">{{tut.description}}</p>
          <div class="d-flex justify-content-between align-items-center mt-auto border-top border-secondary pt-3">
            <span class="badge duration-badge">
              <ng-icon name="bootstrapClock" class="me-1"></ng-icon> {{tut.duration}}
            </span>
            <a [href]="tut.url" target="_blank" class="btn btn-outline-premium">Ver Tutorial</a>
          </div>
        </div>
      </div>
      
      <div class="col-12 text-center text-muted py-5" *ngIf="tutorials.length === 0">
        Actualmente no hay tutoriales publicados.
      </div>
    </div>
  </div>
</section>
